name: CI

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1

jobs:
    fmt:
        name: Format (rustfmt)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                components: rustfmt

            - name: Check format
              run: cargo fmt --all -- --check

    clippy:
        name: Linter (clippy)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                components: clippy

            - name: Cargo Cache
              uses: actions/cache@v4
              with:
                  path: |
                    ~/.cargo/registry
                    ~/.cargo/git
                    target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Run Clippy
              run: cargo clippy --all-targets --all-features -- -D warnings

    test:
        name: Build & Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cargo Cache
              uses: actions/cache@v4
              with:
                  path: |
                    ~/.cargo/registry
                    ~/.cargo/git
                    target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Build
              run: cargo build --verbose

            - name: Tests
              run: cargo test --verbose